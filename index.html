<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koowzah Brand</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <header>
        <div class="logo">
            <img src="logo.png" alt="Brand Logo">
            <h1>Koowzah</h1>
        </div>
        <nav>
            <a href="#home">Home</a>
            <a href="#videos">Videos</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <!-- HERO -->
    <section id="home" class="hero">
        <h2>Build. Grow. Inspire.</h2>
        <p>Welcome to my YouTube brand website</p>
        <a href="#videos" class="btn">Watch Videos</a>
    </section>

    <!-- VIDEOS -->
    <section id="videos" class="videos">
        <h2>Latest Videos</h2>

        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID" allowfullscreen></iframe>
            <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID" allowfullscreen></iframe>
        </div>
    </section>

    <!-- ABOUT -->
    <section id="about" class="about">
        <h2>About Me</h2>
        <p>
            I create content about growth, mindset, and success.
            Follow my journey and learn with me.
        </p>
    </section>

    <!-- CONTACT -->
    <section id="contact" class="contact">
        <h2>Contact</h2>
        <button onclick="showMessage()">Click to Connect</button>
    </section>

    <footer>
        <p>© 2026 Koowzah Brand</p>
    </footer>

    <script src="script.js"></script>
</body>
              </html>
